  <path d="M10 20 C10 14 17 11 20 14 C23 17 27 23 30 20 C27 17 23 11 20 14" stroke="#00e5c0" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- right lobe of ∞ -->
