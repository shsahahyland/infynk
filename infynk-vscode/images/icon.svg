<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- molecule network mark — monochrome silhouette for VS Code activity bar -->
  <!-- central node -->
  <circle cx="12" cy="12" r="3" fill="currentColor"/>
  <!-- outer nodes -->
  <circle cx="12" cy="3"  r="2" fill="currentColor"/>
  <circle cx="21" cy="8"  r="2" fill="currentColor"/>
  <circle cx="3"  cy="8"  r="2" fill="currentColor"/>
  <circle cx="5"  cy="19" r="2" fill="currentColor"/>
  <circle cx="19" cy="19" r="2" fill="currentColor"/>
  <!-- connector lines -->
  <line x1="12" y1="5"  x2="12" y2="9"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="10" x2="15" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5"  y1="10" x2="9"  y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6"  y1="18" x2="10" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="18" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
