<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="{{CSP}}" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>infynk</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
      color: var(--vscode-foreground);
      background: var(--vscode-sideBar-background);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--vscode-sideBarSectionHeader-border, #333);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--vscode-sideBarTitle-foreground, var(--vscode-foreground));
      flex: 1;
    }

    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .health-dot.online  { background: #22c55e; }
    .health-dot.offline { background: #ef4444; }

    /* ── Team selector ───────────────────────────────────────── */
    .team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      flex-shrink: 0;
    }

    .team-label {
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
      flex-shrink: 0;
    }

    select {
      flex: 1;
      background: var(--vscode-dropdown-background);
      color: var(--vscode-dropdown-foreground);
      border: 1px solid var(--vscode-dropdown-border);
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 12px;
      font-family: var(--vscode-font-family);
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: var(--vscode-focusBorder);
    }

    /* ── Messages area ───────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--vscode-scrollbarSlider-background); border-radius: 2px; }

    /* ── Message bubbles ─────────────────────────────────────── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 100%;
    }

    .msg-role {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--vscode-descriptionForeground);
    }

    .msg-user .msg-role { color: var(--vscode-textLink-activeForeground, #4f8cff); }

    .msg-text {
      background: var(--vscode-input-background);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-user .msg-text {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
    }

    /* ── Confidence bar ──────────────────────────────────────── */
    .confidence-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .confidence-label {
      font-size: 10px;
      color: var(--vscode-descriptionForeground);
      flex-shrink: 0;
      min-width: 70px;
    }

    .confidence-track {
      flex: 1;
      height: 4px;
      background: var(--vscode-progressBar-background, #333);
      border-radius: 2px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      border-radius: 2px;
      background: #22c55e;
      transition: width 0.4s ease;
    }

    /* ── Source cards ────────────────────────────────────────── */
    .sources-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }

    .source-card {
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 11px;
      border-left: 3px solid transparent;
      background: var(--vscode-editor-inactiveSelectionBackground, rgba(255,255,255,0.05));
    }

    .source-card[data-source="GH"] { border-left-color: #4f8cff; }
    .source-card[data-source="CF"] { border-left-color: #a78bfa; }
    .source-card[data-source="JR"] { border-left-color: #ffb347; }
    .source-card[data-source="HD"] { border-left-color: #f97316; }

    .source-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 1px 5px;
      border-radius: 3px;
      margin-bottom: 3px;
      color: #fff;
    }

    .source-card[data-source="GH"] .source-badge { background: #4f8cff; }
    .source-card[data-source="CF"] .source-badge { background: #a78bfa; }
    .source-card[data-source="JR"] .source-badge { background: #ffb347; color: #111; }
    .source-card[data-source="HD"] .source-badge { background: #f97316; }

    .source-title {
      font-weight: 600;
      color: var(--vscode-foreground);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    a.source-title {
      color: var(--vscode-textLink-foreground);
      text-decoration: none;
      display: block;
    }

    a.source-title:hover {
      text-decoration: underline;
      color: var(--vscode-textLink-activeForeground);
    }

    .source-snippet {
      color: var(--vscode-descriptionForeground);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--vscode-descriptionForeground);
      border-top-color: var(--vscode-foreground);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .thinking-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
    }

    /* ── Input area ──────────────────────────────────────────── */
    .input-area {
      border-top: 1px solid var(--vscode-sideBarSectionHeader-border, #333);
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 6px;
    }

    textarea {
      flex: 1;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 12px;
      font-family: var(--vscode-font-family);
      resize: none;
      outline: none;
      line-height: 1.4;
      height: 56px;
    }

    textarea::placeholder { color: var(--vscode-input-placeholderForeground); }
    textarea:focus { border-color: var(--vscode-focusBorder); }

    button {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 4px;
      padding: 0 10px;
      font-size: 12px;
      font-family: var(--vscode-font-family);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button:hover { background: var(--vscode-button-hoverBackground); }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-ingest {
      background: transparent;
      color: var(--vscode-descriptionForeground);
      border: 1px solid var(--vscode-button-secondaryBackground, #555);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      align-self: flex-end;
    }

    .btn-ingest:hover {
      background: var(--vscode-button-secondaryHoverBackground, rgba(255,255,255,0.08));
      color: var(--vscode-foreground);
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      color: var(--vscode-descriptionForeground);
      font-size: 12px;
      text-align: center;
      padding: 24px;
    }

    .empty-icon {
      font-size: 28px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <span class="header-title">infynk</span>
    <div class="health-dot" id="healthDot" title="Backend status"></div>
  </div>

  <!-- Team selector -->
  <div class="team-row">
    <span class="team-label">Team</span>
    <select id="teamSelect"></select>
  </div>

  <!-- Message history -->
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔍</div>
      <div>Ask anything about your codebase, docs, or tickets.</div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="questionInput"
        placeholder="Ask a question… (Enter to send, Shift+Enter for newline)"
      ></textarea>
      <button id="sendBtn">Send</button>
    </div>
    <button class="btn-ingest" id="ingestBtn">↺ Re-ingest sources</button>
  </div>

  <script nonce="{{NONCE}}">
    const vscode = acquireVsCodeApi();

    // ── State ────────────────────────────────────────────────────
    const TEAMS = {{TEAMS}};
    let activeTeam = {{DEFAULT_TEAM}};
    let isLoading = false;

    const SOURCE_BADGE_MAP = { GH: 'GitHub', CF: 'Confluence', JR: 'Jira', HD: 'HylandDocs' };
    const HEADER_STRIP_RE = /\[(Repository|File|Owners):[^\]]*\]\s*/g;

    // ── DOM refs ─────────────────────────────────────────────────
    const messagesEl  = document.getElementById('messages');
    const emptyState  = document.getElementById('emptyState');
    const healthDot   = document.getElementById('healthDot');
    const teamSelect  = document.getElementById('teamSelect');
    const questionInput = document.getElementById('questionInput');
    const sendBtn     = document.getElementById('sendBtn');
    const ingestBtn   = document.getElementById('ingestBtn');

    // ── Init ─────────────────────────────────────────────────────
    TEAMS.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      if (t === activeTeam) opt.selected = true;
      teamSelect.appendChild(opt);
    });

    vscode.postMessage({ type: 'ready' });

    // ── Event listeners ──────────────────────────────────────────
    teamSelect.addEventListener('change', () => {
      activeTeam = teamSelect.value;
      vscode.postMessage({ type: 'setTeam', team: activeTeam });
    });

    sendBtn.addEventListener('click', sendQuestion);

    questionInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    });

    ingestBtn.addEventListener('click', () => {
      if (isLoading) return;
      setLoading(true, ingestBtn, 'Ingesting…');
      vscode.postMessage({ type: 'ingest' });
    });

    // ── Host message handler ─────────────────────────────────────
    window.addEventListener('message', ({ data }) => {
      switch (data.type) {
        case 'answer':
          removeThinking();
          appendAssistantMessage(data.answer, data.sources, data.confidence);
          setLoading(false, sendBtn, 'Send');
          break;
        case 'ingestResult':
          setLoading(false, ingestBtn, '↺ Re-ingest sources');
          appendSystemMessage(
            `Ingestion complete — ${data.documents} docs, ${data.nodes} nodes, ${data.edges} edges.`
          );
          break;
        case 'healthStatus':
          healthDot.className = 'health-dot ' + (data.online ? 'online' : 'offline');
          healthDot.title = data.online ? 'Backend online' : 'Backend offline';
          break;
        case 'error':
          removeThinking();
          setLoading(false, sendBtn, 'Send');
          setLoading(false, ingestBtn, '↺ Re-ingest sources');
          appendSystemMessage('Error: ' + data.message, true);
          break;
        case 'setTeam':
          activeTeam = data.team;
          teamSelect.value = data.team;
          break;
        case 'askPrefill':
          activeTeam = data.team;
          teamSelect.value = data.team;
          questionInput.value = data.question;
          questionInput.focus();
          if (data.question) sendQuestion();
          break;
      }
    });

    // ── Core functions ────────────────────────────────────────────
    function sendQuestion() {
      if (isLoading) return;
      const question = questionInput.value.trim();
      if (!question) return;

      questionInput.value = '';
      hideEmpty();
      appendUserMessage(question);
      appendThinking();
      setLoading(true, sendBtn, 'Send');
      vscode.postMessage({ type: 'ask', question, team: activeTeam });
    }

    function appendUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'msg msg-user';
      div.innerHTML = `
        <div class="msg-role">You</div>
        <div class="msg-text">${escapeHtml(text)}</div>
      `;
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function appendAssistantMessage(answer, sources, confidence) {
      const deduped = deduplicateSources(sources);
      const sourcesHtml = deduped.length ? buildSourcesHtml(deduped) : '';
      const confPct = Math.round((confidence ?? 0) * 100);
      const confColor = confPct >= 70 ? '#22c55e' : confPct >= 40 ? '#f59e0b' : '#ef4444';

      const div = document.createElement('div');
      div.className = 'msg msg-assistant';
      div.innerHTML = `
        <div class="msg-role">infynk</div>
        <div class="msg-text">${escapeHtml(answer)}</div>
        <div class="confidence-row">
          <span class="confidence-label">Confidence ${confPct}%</span>
          <div class="confidence-track">
            <div class="confidence-fill" style="width:${confPct}%;background:${confColor}"></div>
          </div>
        </div>
        ${sourcesHtml}
      `;
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function appendThinking() {
      const div = document.createElement('div');
      div.id = 'thinking';
      div.className = 'thinking-row';
      div.innerHTML = '<div class="spinner"></div><span>Thinking…</span>';
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function removeThinking() {
      document.getElementById('thinking')?.remove();
    }

    function appendSystemMessage(text, isError = false) {
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = `
        <div class="msg-text" style="font-style:italic;opacity:0.7;${isError ? 'color:#ef4444' : ''}">
          ${escapeHtml(text)}
        </div>
      `;
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function buildSourcesHtml(sources) {
      const cards = sources.map(s => {
        const sourceKey = detectSourceKey(s.source);
        const badge = SOURCE_BADGE_MAP[sourceKey] ?? s.source;
        const snippet = stripHeaders(s.snippet ?? '');
        const meta = s.metadata ?? {};
        const url = meta.url ?? meta.web_url ?? meta.html_url ?? null;
        const titleText = meta.title ?? meta.summary ?? meta.file ?? meta.key ?? s.document_id ?? s.source;
        const titleHtml = url
          ? `<a class="source-title" href="${escapeHtml(String(url))}" title="${escapeHtml(String(titleText))}" target="_blank">${escapeHtml(String(titleText))}</a>`
          : `<div class="source-title" title="${escapeHtml(String(titleText))}">${escapeHtml(String(titleText))}</div>`;
        return `
          <div class="source-card" data-source="${sourceKey}">
            <span class="source-badge">${escapeHtml(badge)}</span>
            ${titleHtml}
            ${snippet ? `<div class="source-snippet">${escapeHtml(snippet)}</div>` : ''}
          </div>
        `;
      }).join('');
      return `<div class="sources-list">${cards}</div>`;
    }

    // ── Helpers ──────────────────────────────────────────────────
    function deduplicateSources(sources) {
      const seen = new Set();
      return sources.filter(s => {
        const meta = s.metadata ?? {};
        const key = `${s.source}|${meta.url ?? meta.file ?? meta.key ?? s.document_id ?? ''}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function detectSourceKey(source) {
      const s = (source ?? '').toUpperCase();
      if (s.includes('GH') || s.includes('GITHUB')) return 'GH';
      if (s.includes('CF') || s.includes('CONFLUENC')) return 'CF';
      if (s.includes('JR') || s.includes('JIRA')) return 'JR';
      if (s.includes('HD') || s.includes('HYLAND')) return 'HD';
      return s.slice(0, 2) || 'GH';
    }

    function stripHeaders(text) {
      return text.replace(HEADER_STRIP_RE, '').trim();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function setLoading(loading, btn, label) {
      isLoading = loading;
      btn.disabled = loading;
      btn.textContent = label;
    }

    function hideEmpty() {
      emptyState?.remove();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  </script>
</body>
</html>
